<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <rect width="180" height="180" rx="38" fill="#04040e"/>
  <rect x="3" y="3" width="174" height="174" rx="35" stroke="#818cf8" stroke-width="2" stroke-opacity="0.35"/>
  <!-- Subtle glow orb -->
  <ellipse cx="90" cy="85" rx="60" ry="55" fill="url(#radial)" opacity="0.18"/>
  <!-- E lettermark -->
  <text x="58" y="122" font-family="system-ui,-apple-system,sans-serif" font-size="96" font-weight="800"
        fill="url(#grad)" letter-spacing="-5">E</text>
  <!-- Dot accent -->
  <circle cx="148" cy="118" r="14" fill="#a78bfa"/>
  <circle cx="148" cy="118" r="8" fill="#c4b5fd"/>
  <defs>
    <linearGradient id="grad" x1="45" y1="40" x2="135" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818cf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="radial" cx="50%" cy="50%" r="50%">
      <stop stop-color="#818cf8"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
